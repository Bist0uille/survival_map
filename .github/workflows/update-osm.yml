name: Mise à jour base OSM (Aude)

on:
  schedule:
    # Chaque lundi à 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch: {} # déclenchement manuel possible

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Régénérer public/data/pois.json depuis Overpass
        run: node scripts/fetch-osm.mjs

      - name: Commit si la base a changé
        run: |
          git config user.name "Bist0uille"
          git config user.email "111542828+Bist0uille@users.noreply.github.com"
          if git diff --quiet -- public/data/pois.json; then
            echo "Aucun changement dans la base."
          else
            git add public/data/pois.json
            git commit -m "chore(data): MAJ automatique base OSM Aude"
            git push
          fi
