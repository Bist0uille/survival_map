# Construit pois.pmtiles + routes.pmtiles (FR + ES + IT) et les envoie sur
# Cloudflare R2 (trop gros pour le repo à 3 pays → > 100 Mo).
name: Construire PMTiles POI + Itinéraires (R2)

on:
  schedule:
    # Le 1er de chaque mois à 03:00 UTC (fichiers volumineux → mensuel)
    - cron: '0 3 1 * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer osmium + gdal + tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool gdal-bin build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install

      - name: Construire les PMTiles (télécharge FR+ES+IT, filtre, build)
        run: bash scripts/process-osm.sh "france spain italy"

      - name: Envoyer sur Cloudflare R2 (si secrets présents)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          if [ -z "$R2_ACCESS_KEY_ID" ]; then
            echo "Secrets R2 absents → upload sauté (mesure de taille seule)."
            exit 0
          fi
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION=auto
          for f in pois routes; do
            aws s3 cp "/tmp/$f.pmtiles" "s3://$R2_BUCKET/$f.pmtiles" \
              --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com" \
              --content-type application/octet-stream
            echo "✅ $f.pmtiles envoyé sur R2."
          done
